<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoGain Recorder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0f0f0f;
  --surface:     #1a1a1a;
  --surface2:    #252525;
  --border:      #2e2e2e;
  --primary:     #bb86fc;
  --primary-dk:  #9a67ea;
  --green:       #03dac6;
  --amber:       #ffb74d;
  --red:         #cf6679;
  --text:        #e2e2e2;
  --text2:       #888;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100%;
  -webkit-tap-highlight-color: transparent;
}

.app {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ---- Header ---- */
.app-header {
  text-align: center;
  padding: 8px 0 4px;
}
.app-header h1 {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--primary);
}
.app-header p {
  font-size: 0.75rem;
  color: var(--text2);
  letter-spacing: 1px;
}

/* ---- Card ---- */
.card {
  background: var(--surface);
  border-radius: 14px;
  padding: 16px;
  border: 1px solid var(--border);
}
.card-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text2);
  margin-bottom: 14px;
}

/* ---- Record section ---- */
.record-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.record-btn {
  width: 108px;
  height: 108px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  background: transparent;
  color: var(--primary);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  transition: border-color 0.25s, color 0.25s, transform 0.1s;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.record-btn:active { transform: scale(0.94); }
.record-btn .icon { font-size: 2.2rem; line-height: 1; }
.record-btn .label { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

.record-btn.recording {
  border-color: var(--red);
  color: var(--red);
  animation: pulse-ring 1.5s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%,100% { box-shadow: 0 0 0 0 rgba(207,102,121,.4); }
  50%      { box-shadow: 0 0 0 14px rgba(207,102,121,0); }
}

/* ---- Timer ---- */
.timer-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.timer {
  font-size: 2.6rem;
  font-weight: 300;
  font-family: 'Courier New', Courier, monospace;
  font-variant-numeric: tabular-nums;
  letter-spacing: 3px;
  color: var(--text);
  transition: color 0.25s;
}
.timer.recording { color: var(--red); }

.seg-badge {
  font-size: 0.7rem;
  font-weight: 700;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 8px;
  color: var(--text2);
  white-space: nowrap;
  display: none;
}
.seg-badge.active {
  display: inline-block;
  border-color: var(--red);
  color: var(--red);
}

/* ---- VU meter ---- */
.vu-wrap {
  width: 100%;
  height: 52px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface2);
  position: relative;
}
#vuCanvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ---- Status ---- */
.status {
  font-size: 0.82rem;
  color: var(--text2);
  text-align: center;
  min-height: 1.2em;
}
.status.err  { color: var(--red); }
.status.ok   { color: var(--green); }

/* ---- Settings ---- */
.interval-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

/* Toggle switch */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  flex: 1;
  min-width: 160px;
}
.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--surface2);
  border-radius: 24px;
  border: 1px solid var(--border);
  transition: background 0.25s, border-color 0.25s;
  cursor: pointer;
}
.toggle-track::before {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  background: var(--text2);
  border-radius: 50%;
  left: 2px;
  top: 2px;
  transition: transform 0.25s, background 0.25s;
}
.toggle-switch input:checked + .toggle-track {
  background: var(--primary-dk);
  border-color: var(--primary);
}
.toggle-switch input:checked + .toggle-track::before {
  transform: translateX(20px);
  background: #fff;
}
.toggle-label-text { font-size: 0.9rem; }

/* Spinner */
.spinner-group {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.88rem;
  color: var(--text2);
}
.spinner-group.disabled { opacity: .4; pointer-events: none; }
.spinner-field {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.spin-btn {
  width: 30px;
  height: 34px;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  flex-shrink: 0;
}
.spin-btn:active { background: var(--border); }
.spinner-input {
  width: 50px;
  padding: 6px 2px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 1rem;
  text-align: center;
  -moz-appearance: textfield;
}
.spinner-input::-webkit-outer-spin-button,
.spinner-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.spinner-input:focus { outline: none; }

/* ---- Quota ---- */
.quota-bar-outer {
  width: 100%;
  height: 10px;
  background: var(--surface2);
  border-radius: 6px;
  overflow: hidden;
  margin: 8px 0 6px;
}
.quota-bar-fill {
  height: 100%;
  background: var(--green);
  border-radius: 6px;
  transition: width .5s, background .5s;
  min-width: 2px;
}
.quota-bar-fill.warn   { background: var(--amber); }
.quota-bar-fill.danger { background: var(--red); }
.quota-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text2);
}

/* ---- Recordings ---- */
.rec-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.rec-header .card-title { margin-bottom: 0; flex: 1; }
.batch-btns { display: flex; gap: 6px; }

.btn-sm {
  padding: 5px 11px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
}
.btn-sm:active { background: var(--border); }
.btn-sm.accent  { border-color: var(--primary); color: var(--primary); }
.btn-sm.danger  { border-color: var(--red); color: var(--red); }

.sel-all-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 10px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
  color: var(--text2);
}
.sel-all-row label { cursor: pointer; }

input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--primary);
  flex-shrink: 0;
}

.rec-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.rec-item:last-child { border-bottom: none; }

.rec-info { flex: 1; min-width: 0; }
.rec-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
}
.rec-meta {
  font-size: 0.72rem;
  color: var(--text2);
  margin-top: 2px;
}

.rec-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 1.05rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  flex-shrink: 0;
}
.icon-btn:active { background: var(--border); }
.icon-btn.danger { border-color: var(--red); color: var(--red); }
.icon-btn.danger:active { background: rgba(207,102,121,.18); }
.icon-btn:disabled { opacity: .3; cursor: not-allowed; }
.icon-btn.disabled { opacity: .3; cursor: not-allowed; }

.empty-state {
  text-align: center;
  color: var(--text2);
  font-size: 0.9rem;
  padding: 28px 0;
}

/* ---- Toast ---- */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 22px;
  font-size: 0.85rem;
  color: var(--text);
  box-shadow: 0 6px 24px rgba(0,0,0,.5);
  transition: transform .3s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok  { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red);   color: var(--red); }
</style>
</head>
<body>
<div class="app">

  <!-- ===== Header ===== -->
  <header class="app-header">
    <h1>NoGain</h1>
    <p>audio recorder · no processing</p>
  </header>

  <!-- ===== Recording card ===== -->
  <div class="card">
    <div class="card-title">Recording</div>
    <div class="record-section">

      <div class="timer-row">
        <div class="timer" id="timer">00:00:00</div>
        <span class="seg-badge" id="segBadge"></span>
      </div>

      <button class="record-btn" id="recordBtn" onclick="handleRecordToggle()">
        <span class="icon" id="recordIcon">⏺</span>
        <span class="label" id="recordLabel">Record</span>
      </button>

      <div class="vu-wrap">
        <canvas id="vuCanvas"></canvas>
      </div>

      <div class="status" id="status">Tap Record to start</div>
    </div>
  </div>

  <!-- ===== Split settings card ===== -->
  <div class="card">
    <div class="card-title">Auto-Split</div>
    <div class="interval-row">
      <label class="toggle-wrap">
        <span class="toggle-switch">
          <input type="checkbox" id="splitToggle" onchange="onSplitToggleChange()">
          <span class="toggle-track"></span>
        </span>
        <span class="toggle-label-text">Split recording every</span>
      </label>
      <div class="spinner-group" id="spinnerGroup">
        <div class="spinner-field">
          <button class="spin-btn" onclick="adjustInterval(-1)" aria-label="Decrease">−</button>
          <input type="number" class="spinner-input" id="intervalInput" value="60" min="1" max="999"
                 onchange="onIntervalChange()" oninput="onIntervalChange()">
          <button class="spin-btn" onclick="adjustInterval(1)" aria-label="Increase">+</button>
        </div>
        <span>min</span>
      </div>
    </div>
  </div>

  <!-- ===== Visual settings card ===== -->
  <div class="card">
    <div class="card-title">Visual Feedback</div>
    <label class="toggle-wrap">
      <span class="toggle-switch">
        <input type="checkbox" id="vuToggle" checked onchange="onVuToggleChange()">
        <span class="toggle-track"></span>
      </span>
      <span class="toggle-label-text">Show loudness meter</span>
    </label>
  </div>

  <!-- ===== Storage card ===== -->
  <div class="card">
    <div class="card-title">Storage</div>
    <div class="quota-bar-outer">
      <div class="quota-bar-fill" id="quotaFill" style="width:0%"></div>
    </div>
    <div class="quota-labels">
      <span id="quotaUsed">Calculating…</span>
      <span id="quotaTotal"></span>
    </div>
  </div>

  <!-- ===== Recordings card ===== -->
  <div class="card">
    <div class="rec-header">
      <div class="card-title">Recordings</div>
      <div class="batch-btns">
        <button class="btn-sm accent" id="batchDlBtn"  onclick="batchDownload()" style="display:none">⬇ Download</button>
        <button class="btn-sm danger" id="batchDelBtn" onclick="batchDelete()"   style="display:none">🗑 Delete</button>
      </div>
    </div>
    <div class="sel-all-row" id="selAllRow" style="display:none">
      <input type="checkbox" id="selAllCb" onchange="toggleSelectAll(this.checked)">
      <label for="selAllCb">Select all</label>
    </div>
    <div id="recList"></div>
  </div>

</div><!-- .app -->

<div class="toast" id="toast"></div>

<script>
'use strict';

// ─────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────
const DB_NAME    = 'nogain';
const DB_VERSION = 1;
const STORE      = 'recordings';

const MIME_PRIORITY = [
  'audio/mp4;codecs=mp4a.40.2',
  'audio/mp4',
  'audio/aac',
  'audio/webm;codecs=opus',
  'audio/webm',
  'audio/ogg;codecs=opus',
];

const RECORDER_TIMESLICE_MS        = 500;  // chunk interval for MediaRecorder.start()
const DEFAULT_SPLIT_INTERVAL_MIN   = 60;   // default auto-split interval in minutes
const INTERVAL_MIN                 = 1;    // minimum split interval (minutes)
const INTERVAL_MAX                 = 999;  // maximum split interval (minutes)
const TOAST_DISPLAY_MS             = 3000; // how long toast notifications stay visible
const DOWNLOAD_URL_REVOKE_DELAY_MS = 2000; // delay before revoking blob object URL
const DOWNLOAD_STAGGER_MS          = 250;  // delay between consecutive batch downloads

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let db              = null;
let micStream       = null;
let audioCtx        = null;
let analyserNode    = null;
let mediaRecorder   = null;
let recChunks       = [];
let recTimestamp    = null;   // Date.now() at segment start
let segStartPerf    = null;   // performance.now() at segment start
let priorElapsedMs  = 0;      // sum of completed-segment durations
let segmentIndex    = 0;
let isRecording     = false;
let mimeType        = '';
let splitTimeoutId  = null;
let timerIntervalId = null;
let vuRafId         = null;
let toastTimerId    = null;
let wakeLock        = null;   // wake lock sentinel
let vuEnabled       = true;   // VU meter toggle state
let currentAudio    = null;   // currently playing audio element

// ─────────────────────────────────────────────
// IndexedDB
// ─────────────────────────────────────────────
function dbOpen() {
  if (db) return Promise.resolve(db);
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'timestamp' });
      }
    };
    req.onsuccess = () => { db = req.result; res(db); };
    req.onerror   = () => rej(req.error);
  });
}

async function dbPut(record) {
  const d = await dbOpen();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(record);
    req.onsuccess = () => res();
    req.onerror   = () => rej(req.error);
  });
}

async function dbGetAll() {
  const d = await dbOpen();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result.sort((a, b) => b.timestamp - a.timestamp));
    req.onerror   = () => rej(req.error);
  });
}

async function dbGet(timestamp) {
  const d = await dbOpen();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(timestamp);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

async function dbDelete(timestamps) {
  if (!timestamps.length) return;
  const d = await dbOpen();
  return new Promise((res, rej) => {
    const tx    = d.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    let n       = timestamps.length;
    for (const ts of timestamps) {
      const req     = store.delete(ts);
      req.onsuccess = () => { if (--n === 0) res(); };
      req.onerror   = () => rej(req.error);
    }
  });
}

// ─────────────────────────────────────────────
// Codec helpers
// ─────────────────────────────────────────────
function bestMimeType() {
  for (const m of MIME_PRIORITY) {
    if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(m)) return m;
  }
  return '';
}

function extFor(mime) {
  if (!mime) return 'audio';
  if (mime.startsWith('audio/mp4') || mime.startsWith('audio/aac')) return 'm4a';
  if (mime.startsWith('audio/webm')) return 'webm';
  if (mime.startsWith('audio/ogg'))  return 'ogg';
  return 'audio';
}

function shortMime(mime) {
  if (!mime) return '?';
  const m = mime.split(';')[0];
  if (m === 'audio/mp4') return 'AAC/M4A';
  if (m === 'audio/aac') return 'AAC';
  if (m === 'audio/webm') return 'WebM/Opus';
  if (m === 'audio/ogg')  return 'OGG/Opus';
  return m;
}

// ─────────────────────────────────────────────
// Microphone
// ─────────────────────────────────────────────
async function ensureStream() {
  if (micStream && micStream.active) return micStream;
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation:  false,
      noiseSuppression:  false,
      autoGainControl:   false,
    }
  });
  micStream.getAudioTracks()[0].addEventListener('ended', () => {
    if (isRecording) stopRecordingUser('Microphone disconnected');
  });
  return micStream;
}

// ─────────────────────────────────────────────
// Audio analyser (VU meter source)
// ─────────────────────────────────────────────
function initAnalyser(stream) {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 256;
  analyserNode.smoothingTimeConstant = 0.75;
  audioCtx.createMediaStreamSource(stream).connect(analyserNode);
  // Do NOT connect to destination — avoids playback / feedback
}

// ─────────────────────────────────────────────
// MediaRecorder factory
// ─────────────────────────────────────────────
function makeRecorder(stream, mime, onChunk) {
  let mr;
  try {
    mr = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
  } catch (_) {
    mr = new MediaRecorder(stream);
  }
  mr.ondataavailable = e => { if (e.data && e.data.size > 0) onChunk(e.data); };
  return mr;
}

// ─────────────────────────────────────────────
// Save a blob to IndexedDB
// ─────────────────────────────────────────────
async function persistSegment(timestamp, blob, durationMs, mime) {
  await dbPut({ timestamp, blob, durationMs, mimeType: mime, size: blob.size });
  await refreshList();
  await refreshQuota();
}

// ─────────────────────────────────────────────
// Wake Lock
// ─────────────────────────────────────────────
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        console.log('Wake Lock released');
      });
      console.log('Wake Lock acquired');
    } catch (err) {
      console.error('Wake Lock error:', err);
    }
  }
}

async function releaseWakeLock() {
  if (wakeLock) {
    try {
      await wakeLock.release();
      wakeLock = null;
    } catch (err) {
      console.error('Wake Lock release error:', err);
    }
  }
}

// ─────────────────────────────────────────────
// Start recording
// ─────────────────────────────────────────────
async function startRecording() {
  if (isRecording) return;
  
  // Stop any playing audio before starting recording
  stopCurrentAudio();
  
  setStatus('Requesting microphone…');
  try {
    const stream = await ensureStream();
    initAnalyser(stream);

    mimeType       = bestMimeType();
    recTimestamp   = Date.now();
    segStartPerf   = performance.now();
    priorElapsedMs = 0;
    segmentIndex   = 1;
    recChunks      = [];
    isRecording    = true;

    mediaRecorder = makeRecorder(stream, mimeType, c => recChunks.push(c));
    mediaRecorder.start(RECORDER_TIMESLICE_MS);

    await requestWakeLock();
    startTimer();
    startVU();
    if (splitEnabled()) scheduleSplit();

    updateRecordUI(true);
    setStatus(`${shortMime(mimeType)} · auto-gain off`, 'ok');
  } catch (err) {
    isRecording = false;
    setStatus('Error: ' + (err.message || err), 'err');
    console.error(err);
  }
}

// ─────────────────────────────────────────────
// Seamless split
// ─────────────────────────────────────────────
function splitRecording() {
  if (!isRecording || !mediaRecorder) return;

  clearSplit();

  const now          = performance.now();
  const segDuration  = now - segStartPerf;
  const newTimestamp = Date.now();

  // Snapshot state for the segment about to be closed
  const oldChunks    = recChunks;
  const oldTimestamp = recTimestamp;
  const oldMime      = mimeType;

  // ── Start the NEW recorder BEFORE stopping the old one ──
  recChunks    = [];
  recTimestamp = newTimestamp;
  segStartPerf = now;
  priorElapsedMs += segDuration;
  segmentIndex++;

  const newRecorder = makeRecorder(micStream, mimeType, c => recChunks.push(c));
  newRecorder.onstop = mediaRecorder.onstop; // keep any future onstop chain
  newRecorder.start(RECORDER_TIMESLICE_MS);

  // ── Stop the old recorder ──
  const oldRecorder = mediaRecorder;
  mediaRecorder     = newRecorder;

  oldRecorder.onstop = async () => {
    if (oldChunks.length) {
      const blob = new Blob(oldChunks, { type: oldMime || 'audio/webm' });
      await persistSegment(oldTimestamp, blob, segDuration, oldMime);
      showToast(`Segment ${segmentIndex - 1} saved`, 'ok');
    }
  };
  oldRecorder.stop();

  updateSegBadge();
  scheduleSplit();
}

// ─────────────────────────────────────────────
// Stop recording (user-initiated)
// ─────────────────────────────────────────────
async function stopRecordingUser(msg) {
  if (!isRecording) return;
  clearSplit();
  isRecording = false;

  const segDuration = performance.now() - segStartPerf;
  const finalChunks = recChunks;
  const finalTs     = recTimestamp;
  const finalMime   = mimeType;

  updateRecordUI(false);
  setStatus(msg || 'Stopping…');

  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    await finishStop(finalChunks, finalTs, segDuration, finalMime);
    return;
  }

  mediaRecorder.onstop = async () => {
    await finishStop(finalChunks, finalTs, segDuration, finalMime);
  };
  mediaRecorder.stop();
}

async function finishStop(chunks, ts, durationMs, mime) {
  stopTimer();
  stopVU();
  await releaseWakeLock();

  if (chunks.length) {
    const blob = new Blob(chunks, { type: mime || 'audio/webm' });
    await persistSegment(ts, blob, durationMs, mime);
    showToast('Recording saved', 'ok');
  }
  setStatus('Tap Record to start');
}

// ─────────────────────────────────────────────
// Toggle handler
// ─────────────────────────────────────────────
async function handleRecordToggle() {
  if (isRecording) {
    await stopRecordingUser();
  } else {
    await startRecording();
  }
}

// ─────────────────────────────────────────────
// Timer
// ─────────────────────────────────────────────
function startTimer() {
  stopTimer();
  timerIntervalId = setInterval(updateTimerDisplay, 100);
}

function stopTimer() {
  clearInterval(timerIntervalId);
  timerIntervalId = null;
  document.getElementById('timer').textContent   = '00:00:00';
  document.getElementById('timer').className     = 'timer';
}

function updateTimerDisplay() {
  const ms       = priorElapsedMs + (performance.now() - segStartPerf);
  const totalSec = Math.floor(ms / 1000);
  const h        = Math.floor(totalSec / 3600);
  const m        = Math.floor((totalSec % 3600) / 60);
  const s        = totalSec % 60;
  document.getElementById('timer').textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
  document.getElementById('timer').className   = 'timer recording';
}

function pad(n) { return String(n).padStart(2, '0'); }

// ─────────────────────────────────────────────
// Split scheduler
// ─────────────────────────────────────────────
function splitEnabled() {
  return document.getElementById('splitToggle').checked;
}

function scheduleSplit() {
  clearSplit();
  const mins    = Math.max(INTERVAL_MIN, parseInt(document.getElementById('intervalInput').value, 10) || DEFAULT_SPLIT_INTERVAL_MIN);
  splitTimeoutId = setTimeout(() => {
    if (isRecording) splitRecording();
  }, mins * 60 * 1000);
}

function clearSplit() {
  if (splitTimeoutId) { clearTimeout(splitTimeoutId); splitTimeoutId = null; }
}

// ─────────────────────────────────────────────
// VU meter
// ─────────────────────────────────────────────
const canvas = document.getElementById('vuCanvas');
const cctx   = canvas.getContext('2d');

function resizeCanvas() {
  const r    = canvas.parentElement.getBoundingClientRect();
  canvas.width  = Math.round(r.width)  || 300;
  canvas.height = Math.round(r.height) || 52;
}

function startVU() {
  stopVU();
  resizeCanvas();
  drawVU();
}

function stopVU() {
  if (vuRafId) { cancelAnimationFrame(vuRafId); vuRafId = null; }
  cctx.clearRect(0, 0, canvas.width, canvas.height);
  cctx.fillStyle = '#252525';
  cctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawVU() {
  vuRafId = requestAnimationFrame(drawVU);
  if (!analyserNode || !vuEnabled) {
    // Draw idle state if VU is disabled
    if (!vuEnabled) {
      cctx.clearRect(0, 0, canvas.width, canvas.height);
      cctx.fillStyle = '#252525';
      cctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    return;
  }

  const W   = canvas.width;
  const H   = canvas.height;
  const buf = analyserNode.frequencyBinCount;
  const data = new Uint8Array(buf);
  analyserNode.getByteFrequencyData(data);

  cctx.clearRect(0, 0, W, H);
  cctx.fillStyle = '#252525';
  cctx.fillRect(0, 0, W, H);

  const bars     = Math.min(60, buf);
  const barW     = (W / bars) - 1;

  for (let i = 0; i < bars; i++) {
    const v   = data[i] / 255;
    const bH  = Math.max(2, v * H);
    const x   = i * (barW + 1);
    const y   = H - bH;
    // green → yellow → red gradient
    const r   = v > 0.5 ? 255 : Math.round(v * 2 * 255);
    const g   = v < 0.5 ? 200 : Math.round((1 - (v - 0.5) * 2) * 200);
    cctx.fillStyle = `rgb(${r},${g},40)`;
    cctx.fillRect(x, y, barW, bH);
  }

  // Peak indicator line
  const rmsArr = Array.from(data);
  const rms    = Math.sqrt(rmsArr.reduce((s, v) => s + v * v, 0) / rmsArr.length) / 255;
  cctx.fillStyle = 'rgba(255,255,255,0.12)';
  cctx.fillRect(0, H - 2, rms * W, 2);
}

// ─────────────────────────────────────────────
// UI updates
// ─────────────────────────────────────────────
function updateRecordUI(recording) {
  const btn = document.getElementById('recordBtn');
  document.getElementById('recordIcon').textContent  = recording ? '⏹' : '⏺';
  document.getElementById('recordLabel').textContent = recording ? 'Stop' : 'Record';
  btn.className = 'record-btn' + (recording ? ' recording' : '');
  updateSegBadge();
  // Refresh list to update play button states
  refreshList().catch(console.error);
}

function updateSegBadge() {
  const badge = document.getElementById('segBadge');
  if (isRecording && splitEnabled()) {
    badge.textContent = 'Seg ' + segmentIndex;
    badge.className   = 'seg-badge active';
  } else {
    badge.className = 'seg-badge'; // hidden via CSS
  }
}

function setStatus(msg, type) {
  const el    = document.getElementById('status');
  el.textContent = msg;
  el.className   = 'status' + (type ? ' ' + type : '');
}

// ─────────────────────────────────────────────
// Settings event handlers
// ─────────────────────────────────────────────
function onSplitToggleChange() {
  const on = splitEnabled();
  document.getElementById('spinnerGroup').className = 'spinner-group' + (on ? '' : ' disabled');
  updateSegBadge();
  if (isRecording) {
    if (on) scheduleSplit(); else clearSplit();
  }
}

function onIntervalChange() {
  if (isRecording && splitEnabled()) scheduleSplit();
}

function adjustInterval(delta) {
  const inp = document.getElementById('intervalInput');
  inp.value = Math.max(INTERVAL_MIN, Math.min(INTERVAL_MAX, (parseInt(inp.value, 10) || DEFAULT_SPLIT_INTERVAL_MIN) + delta));
  onIntervalChange();
}

function onVuToggleChange() {
  vuEnabled = document.getElementById('vuToggle').checked;
  localStorage.setItem('vuEnabled', vuEnabled ? 'true' : 'false');
  if (!vuEnabled && !isRecording) {
    stopVU(); // redraw idle state
  }
}

// ─────────────────────────────────────────────
// Storage quota
// ─────────────────────────────────────────────
async function refreshQuota() {
  if (!navigator.storage || !navigator.storage.estimate) return;
  try {
    const { usage, quota } = await navigator.storage.estimate();
    const usedMB  = (usage  / 1048576).toFixed(1);
    const totalMB = (quota  / 1048576).toFixed(0);
    const pct     = quota > 0 ? (usage / quota) * 100 : 0;
    const fill    = document.getElementById('quotaFill');
    fill.style.width = Math.min(pct, 100) + '%';
    fill.className   = 'quota-bar-fill' + (pct > 90 ? ' danger' : pct > 70 ? ' warn' : '');
    document.getElementById('quotaUsed').textContent  = usedMB + ' MB used';
    document.getElementById('quotaTotal').textContent = totalMB + ' MB quota';
  } catch (e) { /* storage.estimate not available */ }
}

// ─────────────────────────────────────────────
// Recordings list
// ─────────────────────────────────────────────
function fmtDuration(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const r = s % 60;
  return h > 0
    ? pad(h) + ':' + pad(m) + ':' + pad(r)
    : pad(m) + ':' + pad(r);
}

function fmtSize(bytes) {
  if (bytes < 1024)        return bytes + ' B';
  if (bytes < 1048576)     return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}

async function refreshList() {
  const recs    = await dbGetAll();
  const listEl  = document.getElementById('recList');
  const selRow  = document.getElementById('selAllRow');

  if (!recs.length) {
    listEl.innerHTML = '<div class="empty-state">No recordings yet</div>';
    selRow.style.display = 'none';
    updateBatchBtns();
    return;
  }

  selRow.style.display = '';
  document.getElementById('selAllCb').checked       = false;
  document.getElementById('selAllCb').indeterminate = false;

  const playbackAllowed = await canUsePlayback();

  listEl.innerHTML = recs.map(r => {
    const ext  = extFor(r.mimeType);
    const name = new Date(r.timestamp).toISOString().replace(/[:.]/g, '-') + '.' + ext;
    const playBtnDisabled = playbackAllowed ? '' : ' disabled';
    const playBtnTitle = playbackAllowed ? 'Play' : 'Playback disabled during recording';
    return `<div class="rec-item" data-ts="${r.timestamp}">
      <input type="checkbox" class="rec-cb" data-ts="${r.timestamp}" onchange="onCbChange()">
      <div class="rec-info">
        <div class="rec-name">${fmtDate(r.timestamp)}</div>
        <div class="rec-meta">${fmtDuration(r.durationMs)} &nbsp;·&nbsp; ${fmtSize(r.size)} &nbsp;·&nbsp; ${shortMime(r.mimeType)}</div>
      </div>
      <div class="rec-actions">
        <button class="icon-btn play-btn${playBtnDisabled}" title="${playBtnTitle}" onclick="playRecording(${r.timestamp}, this)" ${playbackAllowed ? '' : 'disabled'}>▶</button>
        <button class="icon-btn" title="Download" onclick="downloadOne(${r.timestamp})">⬇</button>
        <button class="icon-btn danger" title="Delete" onclick="deleteOne(${r.timestamp})">🗑</button>
      </div>
    </div>`;
  }).join('');

  updateBatchBtns();
}

function checkedTs() {
  return Array.from(document.querySelectorAll('.rec-cb:checked')).map(c => Number(c.dataset.ts));
}

function updateBatchBtns() {
  const any = checkedTs().length > 0;
  document.getElementById('batchDlBtn').style.display  = any ? '' : 'none';
  document.getElementById('batchDelBtn').style.display = any ? '' : 'none';
}

function onCbChange() {
  updateBatchBtns();
  const all     = document.querySelectorAll('.rec-cb');
  const checked = document.querySelectorAll('.rec-cb:checked');
  const selAll  = document.getElementById('selAllCb');
  selAll.checked       = all.length > 0 && all.length === checked.length;
  selAll.indeterminate = checked.length > 0 && checked.length < all.length;
}

function toggleSelectAll(checked) {
  document.querySelectorAll('.rec-cb').forEach(c => (c.checked = checked));
  updateBatchBtns();
}

// ─────────────────────────────────────────────
// Download / delete helpers
// ─────────────────────────────────────────────
async function downloadOne(ts) {
  const rec = await dbGet(ts);
  if (!rec) return;
  const ext      = extFor(rec.mimeType);
  const filename = new Date(rec.timestamp).toISOString().replace(/[:.]/g, '-') + '.' + ext;
  triggerDownload(rec.blob, filename);
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), { href: url, download: filename });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), DOWNLOAD_URL_REVOKE_DELAY_MS);
}

async function deleteOne(ts) {
  if (!confirm('Delete this recording?')) return;
  await dbDelete([ts]);
  showToast('Deleted', 'ok');
  await refreshList();
  await refreshQuota();
}

async function batchDownload() {
  const tsList = checkedTs();
  if (!tsList.length) return;
  for (const ts of tsList) {
    const rec = await dbGet(ts);
    if (!rec) continue;
    const ext      = extFor(rec.mimeType);
    const filename = new Date(rec.timestamp).toISOString().replace(/[:.]/g, '-') + '.' + ext;
    triggerDownload(rec.blob, filename);
    await sleep(DOWNLOAD_STAGGER_MS); // stagger to avoid browser blocking multiple downloads
  }
  showToast(`Downloaded ${tsList.length} file(s)`, 'ok');
}

async function batchDelete() {
  const tsList = checkedTs();
  if (!tsList.length) return;
  if (!confirm(`Delete ${tsList.length} recording(s)?`)) return;
  await dbDelete(tsList);
  showToast(`Deleted ${tsList.length} recording(s)`, 'ok');
  await refreshList();
  await refreshQuota();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─────────────────────────────────────────────
// Audio playback
// ─────────────────────────────────────────────
function stopCurrentAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  // Update all play buttons back to play state
  document.querySelectorAll('.play-btn').forEach(btn => {
    btn.textContent = '▶';
    btn.title = 'Play';
  });
}

async function playRecording(ts, btnElement) {
  // If currently playing this recording, stop it
  if (currentAudio && currentAudio.dataset.ts == ts) {
    stopCurrentAudio();
    return;
  }
  
  // Stop any other playing audio
  stopCurrentAudio();
  
  const rec = await dbGet(ts);
  if (!rec) return;
  
  const audio = new Audio(URL.createObjectURL(rec.blob));
  audio.dataset.ts = ts;
  currentAudio = audio;
  
  btnElement.textContent = '⏸';
  btnElement.title = 'Pause';
  
  audio.onended = () => {
    stopCurrentAudio();
  };
  
  audio.onerror = () => {
    stopCurrentAudio();
    showToast('Playback error', 'err');
  };
  
  try {
    await audio.play();
  } catch (err) {
    stopCurrentAudio();
    showToast('Playback failed: ' + err.message, 'err');
  }
}

async function canUsePlayback() {
  // Check if we can detect audio output devices
  if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
    return true; // Can't detect, so allow playback
  }
  
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const audioOutputs = devices.filter(d => d.kind === 'audiooutput');
    
    // If we can't enumerate or no specific outputs found, allow playback
    if (!audioOutputs.length) return true;
    
    // Check if any device looks like headphones/earbuds
    // Common patterns in device labels: headphone, earphone, earbud, headset, airpods, etc.
    const hasHeadphones = audioOutputs.some(d => {
      const label = (d.label || '').toLowerCase();
      return label.includes('headphone') || 
             label.includes('headset') || 
             label.includes('earbud') ||
             label.includes('earphone') ||
             label.includes('airpod') ||
             label.includes('bluetooth') ||
             label.includes('usb audio');
    });
    
    // If recording and only built-in speakers available, disable playback
    if (isRecording && !hasHeadphones) {
      return false;
    }
    
    return true;
  } catch (err) {
    // If detection fails, allow playback
    console.warn('Audio device detection failed:', err);
    return true;
  }
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
function showToast(msg, type) {
  const el  = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (type ? ' ' + type : '');
  if (toastTimerId) clearTimeout(toastTimerId);
  toastTimerId = setTimeout(() => el.classList.remove('show'), TOAST_DISPLAY_MS);
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
async function init() {
  // Sync HTML input constraints with JS constants
  const inp  = document.getElementById('intervalInput');
  inp.value  = DEFAULT_SPLIT_INTERVAL_MIN;
  inp.min    = INTERVAL_MIN;
  inp.max    = INTERVAL_MAX;

  // Initialize spinner group visual state (disabled until toggle is on)
  document.getElementById('spinnerGroup').className = 'spinner-group disabled';

  // Load VU meter preference
  const vuPref = localStorage.getItem('vuEnabled');
  if (vuPref !== null) {
    vuEnabled = vuPref === 'true';
    document.getElementById('vuToggle').checked = vuEnabled;
  }

  await dbOpen();
  await refreshList();
  await refreshQuota();

  resizeCanvas();
  stopVU(); // draw idle state
}

window.addEventListener('resize', () => {
  resizeCanvas();
  if (!isRecording) stopVU();
});

init().catch(console.error);
</script>
